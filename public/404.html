<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InSelf Color - 존재하지 않는 페이지입니다 (404 Error)</title>
    <link rel="icon" type="image/png" href="/images/seasons/favicon.png" />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: #fdfaf6;
        color: #3d2b1a;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }
      .container {
        padding: 30px;
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 4px 30px rgba(61, 43, 26, 0.04);
        border: 1px solid rgba(196, 149, 106, 0.15);
        max-width: 480px;
        width: 90%;
      }
      .logo {
        height: 48px;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 24px;
        font-weight: 700;
        margin: 0 0 12px 0;
        color: #c4956a;
      }
      p {
        font-size: 14px;
        line-height: 1.6;
        color: rgba(61, 43, 26, 0.8);
        margin: 0 0 24px 0;
      }
      .btn {
        display: inline-block;
        background: #c4956a;
        color: #ffffff;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        padding: 12px 28px;
        border-radius: 50px;
        transition: background 0.2s ease, transform 0.2s ease;
        box-shadow: 0 4px 12px rgba(196, 149, 106, 0.2);
      }
      .btn:hover {
        background: #b28359;
        transform: translateY(-1px);
      }
      .btn:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img class="logo" src="/images/seasons/logo.png" alt="InSelf Color Logo" onerror="this.style.display='none';">
      <h1>존재하지 않는 페이지입니다</h1>
      <p>
        죄송합니다. 요청하신 주소가 변경되었거나 잘못된 경로입니다.<br>
        나다운 드레스룸과 뷰티 메이크업 가이드를 만나러<br>
        아래 버튼을 눌러 메인 화면박스 앱으로 이동해주세요!
      </p>
      <a href="https://inselfcolor.pages.dev" class="btn">메인으로 돌아가기</a>
    </div>
  </body>
</html>
